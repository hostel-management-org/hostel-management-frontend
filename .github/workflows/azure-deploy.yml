name: Build and Deploy to Azure Static Web Apps

# Triggers
on:
  push:
    branches:
      - main          # deploy automatically on every push to main
  pull_request:
    branches:
      - main          # build-check (no deploy) on PRs targeting main
  workflow_dispatch:  # allow manual runs from the GitHub Actions tab

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history for SonarCloud / tagging

      # ── 2. Node.js setup ─────────────────────────────────────────────────
      # Pinned to Node 18 LTS (same as local dev / SonarCloud workflow).
      # Using the built-in npm cache avoids re-downloading packages on
      # every run and removes any stale node_modules permissions issue.
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'          # caches ~/.npm, NOT node_modules

      # ── 3. Install dependencies ───────────────────────────────────────────
      # npm ci:
      #   • Always does a clean install from package-lock.json
      #   • Sets correct execute bits on node_modules/.bin/* on Linux
      #   • Is faster and more reproducible than npm install in CI
      - name: Install dependencies
        run: npm ci

      # ── 4. Build ─────────────────────────────────────────────────────────
      # CI=false prevents ESLint warnings from being treated as errors
      # (the default GitHub Actions CI=true behaviour breaks many CRA builds).
      - name: Build production bundle
        run: npm run build
        env:
          CI: false             # warnings stay warnings, not errors
          GENERATE_SOURCEMAP: false   # smaller bundle, hides source in prod

      # ── 5. Deploy ─────────────────────────────────────────────────────────
      # Uses the official Azure Static Web Apps deploy action.
      # Required secrets (add in GitHub → Settings → Secrets → Actions):
      #   AZURE_STATIC_WEB_APPS_API_TOKEN  – from Azure Portal → your SWA →
      #                                      Manage deployment token
      #
      # skip_app_build: true  → we already built in step 4; don't rebuild
      # app_location:   '/'   → repo root (where package.json lives)
      # output_location:'build' → CRA output folder
      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          skip_app_build: true        # build was done in step 4
          app_location: '/'
          output_location: 'build'

  # ── Close PR environment when a PR is merged / closed ──────────────────
  close_pull_request:
    name: Close Pull Request Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
          app_location: '/'
