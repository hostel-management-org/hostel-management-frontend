name: Deploy Hostel Frontend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build CRA production bundle
      - name: Build React App
        run: npm run build

      # 5️⃣ Run tests safely in CI
      - name: Run CI tests
        run: npm run test:ci
        continue-on-error: true  # Don't fail the deploy if no tests exist yet

      # 6️⃣ Deploy to Azure using Publish Profile
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hostel-management-frontend'  # Make sure this matches exactly your Azure Web App name
          slot-name: 'Production'
          package: 'build'                          # Path relative to repo root
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
