name: Deploy Hostel Frontend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js 20
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Build CRA app
      - run: npm run build

      # 5️⃣ Run CI-safe tests
      - run: npm run test:ci

      # 6️⃣ Deploy to Azure Web App using publish profile
      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'hostel-management-frontend'  # Your Azure Web App name
          slot-name: 'Production'
          package: './build'                        # CRA build folder
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
