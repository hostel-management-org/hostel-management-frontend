name: Deploy Hostel Frontend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Build React App
      - run: npm run build

      # 5️⃣ Run CI-safe tests (optional)
      - run: npm run test:ci
        continue-on-error: true

      # 6️⃣ Deploy to Azure using **Publish Profile**
      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'hostel-management-frontend'   # exact name of your Azure Web App
          slot-name: 'Production'
          package: 'build'                          # CRA build folder
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
